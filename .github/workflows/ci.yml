name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Telemetrix.slnx

      - name: Build
        run: dotnet build Telemetrix.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Telemetrix.slnx --configuration Release --no-build --verbosity normal

      - name: Pack (verify the NuGet package builds)
        run: dotnet pack src/Telemetrix/Telemetrix.csproj --configuration Release --no-build --output artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: telemetrix-nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error
