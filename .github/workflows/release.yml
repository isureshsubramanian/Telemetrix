name: Release

# Publishes the Telemetrix NuGet package.
#
# Trigger by pushing a version tag, e.g.:
#     git tag v0.1.0 && git push origin v0.1.0
# or run manually from the Actions tab and supply a version.
#
# Requires a repository secret named NUGET_API_KEY
# (Settings -> Secrets and variables -> Actions).

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore Telemetrix.slnx

      - name: Test
        run: dotnet test Telemetrix.slnx --configuration Release

      - name: Pack
        run: >
          dotnet pack src/Telemetrix/Telemetrix.csproj
          --configuration Release
          --output artifacts
          -p:Version=${{ steps.version.outputs.value }}
          -p:ContinuousIntegrationBuild=true

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Attach package to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.nupkg
